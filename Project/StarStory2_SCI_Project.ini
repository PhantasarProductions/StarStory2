*list:DESCRIPTION
	Famous virologist Gavida Klahr|'e and her assistant Berindo Yorno investigate a thread posed by a very dangerous and sophisticated virus.
	However things do not appear to be the way they should be. Klahr|'e is a typical no-nonsense woman with no tolerance at all for conspiracy theories,
	but it appears she'd better start believing in conspiracy stories now.... She's in one.
	===
	Accompanied by the physician Dr. Sal'pr'drita and her body guard Ashley Johnson, Klahr|'e will have to find out what is going on, preventing she gets caught, and...
	Ally herself with the people she always believed to be merely conspiracy theorists.
*end
